<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Access Required | Ecliptica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500&family=Libre+Baskerville:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-navy: #1B2340;
      --color-gold: #C9A84C;
      --color-ivory: #F7F5F0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Libre Baskerville', serif;
      background-color: var(--color-navy);
      color: var(--color-ivory);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 500px;
      text-align: center;
    }

    .logo {
      width: 180px;
      margin-bottom: 3rem;
    }

    .lock-icon {
      width: 48px;
      height: 48px;
      margin-bottom: 2rem;
      opacity: 0.6;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 300;
      margin-bottom: 1.5rem;
      color: var(--color-ivory);
    }

    .message {
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 3rem;
      color: rgba(247, 245, 240, 0.8);
    }

    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 1rem 2.5rem;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background-color: var(--color-gold);
      color: var(--color-navy);
    }

    .btn-primary:hover {
      background-color: #d4b55a;
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--color-gold);
      border: 1px solid var(--color-gold);
    }

    .btn-secondary:hover {
      background-color: rgba(201, 168, 76, 0.1);
    }

    .divider {
      width: 60px;
      height: 1px;
      background-color: var(--color-gold);
      margin: 3rem auto;
      position: relative;
    }

    .divider::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      width: 8px;
      height: 8px;
      background-color: var(--color-gold);
    }

    .footer-text {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(247, 245, 240, 0.4);
    }

    .loading {
      display: none;
    }

    .loading.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(201, 168, 76, 0.2);
      border-top-color: var(--color-gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .auth-content {
      display: block;
    }

    .auth-content.hidden {
      display: none;
    }

    .tool-frame {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .tool-frame.active {
      display: block;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.75rem;
      }

      .buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="gateContainer">
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <p class="message">Verifying access...</p>
    </div>

    <div class="auth-content" id="authContent">
      <img src="https://ecliptica-ops.com/reversed_logo_color.png" alt="Ecliptica" class="logo">

      <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>

      <h1>Member Access Required</h1>

      <p class="message">
        Please sign up or sign in to your Members Account to access.
      </p>

      <div class="buttons">
        <a href="https://ecliptica-ops.com/login" class="btn btn-primary">Sign In</a>
        <a href="https://ecliptica-ops.com/login" class="btn btn-secondary">Sign Up</a>
      </div>

      <div class="divider"></div>

      <p class="footer-text">Ecliptica Intelligence Systems</p>
    </div>
  </div>

  <iframe id="toolFrame" class="tool-frame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals"></iframe>

  <script>
    /**
     * ECLIPTICA TOOL AUTH GATE
     *
     * This script MUST be the entry point for any protected tool subdomain.
     * It enforces authentication before ANY tool content is accessible.
     *
     * HOW IT WORKS:
     * 1. Checks for authentication token in URL (passed from Members Area)
     * 2. Validates token against Supabase edge function
     * 3. If valid: loads the actual tool in an iframe or redirects
     * 4. If invalid: shows branded access-denied screen
     *
     * DEPLOYMENT:
     * 1. This file should be index.html on the tool subdomain
     * 2. Move actual tool to /app/ or similar path
     * 3. Update TOOL_APP_PATH below
     */

    const CONFIG = {
      // REQUIRED: Update this for each tool subdomain
      // Must match the slug in Admin > Member Tools
      TOOL_SLUG: window.location.hostname.split('.')[0].replace('simulator', '-simulator').replace('diagnostic', '-diagnostic'),

      // Supabase project URL
      SUPABASE_URL: 'https://afzceywxymltjbkhcsbd.supabase.co',

      // Main Ecliptica site URL
      MAIN_SITE_URL: 'https://ecliptica-ops.com',

      // Path to actual tool content (relative to this domain)
      // The real tool should be moved to this path
      TOOL_APP_PATH: '/app/',

      // Session duration in hours
      SESSION_DURATION_HOURS: 1,
    };

    // Derive tool slug from hostname if not explicitly set
    function getToolSlug() {
      const hostname = window.location.hostname;
      if (hostname.includes('acquisitionsimulator')) return 'acquisition-simulator';
      if (hostname.includes('growthdiagnostic')) return 'growth-diagnostic';
      return CONFIG.TOOL_SLUG;
    }

    const TOOL_SLUG = getToolSlug();

    const loadingEl = document.getElementById('loading');
    const authContentEl = document.getElementById('authContent');
    const gateContainer = document.getElementById('gateContainer');
    const toolFrame = document.getElementById('toolFrame');

    function showLoading() {
      loadingEl.classList.add('active');
      authContentEl.classList.add('hidden');
    }

    function showAuthScreen() {
      loadingEl.classList.remove('active');
      authContentEl.classList.remove('hidden');
      gateContainer.style.display = 'block';
      toolFrame.classList.remove('active');
    }

    function showTool(toolPath) {
      gateContainer.style.display = 'none';
      toolFrame.src = toolPath;
      toolFrame.classList.add('active');
    }

    function redirectToTool(toolPath) {
      window.location.href = toolPath;
    }

    function isSessionValid() {
      const storedExpiry = sessionStorage.getItem('ecliptica_token_expiry');
      const storedSlug = sessionStorage.getItem('ecliptica_tool_slug');

      if (!storedExpiry || !storedSlug) return false;
      if (storedSlug !== TOOL_SLUG) return false;

      return new Date(storedExpiry) > new Date();
    }

    function storeSession(token, userInfo) {
      sessionStorage.setItem('ecliptica_tool_token', token);
      sessionStorage.setItem('ecliptica_user_info', JSON.stringify(userInfo));
      sessionStorage.setItem('ecliptica_tool_slug', TOOL_SLUG);

      const expiry = new Date();
      expiry.setHours(expiry.getHours() + CONFIG.SESSION_DURATION_HOURS);
      sessionStorage.setItem('ecliptica_token_expiry', expiry.toISOString());
    }

    function clearSession() {
      sessionStorage.removeItem('ecliptica_tool_token');
      sessionStorage.removeItem('ecliptica_user_info');
      sessionStorage.removeItem('ecliptica_tool_slug');
      sessionStorage.removeItem('ecliptica_token_expiry');
    }

    async function validateToken(token) {
      try {
        const response = await fetch(
          `${CONFIG.SUPABASE_URL}/functions/v1/validate-tool-access`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              token: token,
              tool_slug: TOOL_SLUG,
            }),
          }
        );

        return await response.json();
      } catch (error) {
        console.error('Token validation error:', error);
        return { valid: false, reason: 'network_error' };
      }
    }

    async function init() {
      // Get token from URL
      const urlParams = new URLSearchParams(window.location.search);
      const urlToken = urlParams.get('token');

      // If we have a valid stored session, allow access
      if (isSessionValid()) {
        const toolPath = CONFIG.TOOL_APP_PATH + window.location.search.replace(/[?&]token=[^&]+/, '');
        redirectToTool(toolPath);
        return;
      }

      // No token in URL and no valid session = show auth screen
      if (!urlToken) {
        showAuthScreen();
        return;
      }

      // Validate the token
      showLoading();

      const result = await validateToken(urlToken);

      if (result.valid) {
        // Store session for future requests
        storeSession(urlToken, result.user);

        // Clean URL and redirect to tool
        const cleanUrl = window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);

        redirectToTool(CONFIG.TOOL_APP_PATH);
      } else {
        // Invalid token, clear any stale session data
        clearSession();
        showAuthScreen();
      }
    }

    // Run initialization
    init();
  </script>
</body>
</html>
