# ECLIPTICA TOOL SUBDOMAIN - NETLIFY CONFIGURATION
#
# This configuration enables the auth gate edge function for all routes.
# Copy this file to your tool subdomain's root directory.

[build]
  publish = "dist"
  command = "npm run build"

# Edge function that enforces authentication on ALL routes
[[edge_functions]]
  path = "/*"
  function = "auth-gate"

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
